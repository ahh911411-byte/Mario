<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Level Infinitum - Universal Sync</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        body {
            background: #0f1423;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 10px;
            color: #ffcc00;
            text-shadow: 3px 3px #ff3300, 5px 5px #000;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #gameContainer {
            position: relative;
            border: 6px solid #fff;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
        }
        canvas {
            background: #5c94fc;
            display: block;
            image-rendering: pixelated;
            touch-action: none;
        }
        .controls-hint {
            margin-top: 15px;
            font-size: 1rem;
            color: #ccc;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
        }
        .key {
            background: #e0e0e0;
            padding: 2px 8px;
            border-radius: 4px;
            color: #000;
            font-weight: bold;
            box-shadow: 0 2px #999;
        }
        #touchControls {
            display: none;
            position: absolute;
            bottom: 15px;
            left: 0;
            width: 100%;
            height: 110px;
            padding: 0 30px;
            pointer-events: none;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .dpad, .action-buttons {
            display: flex;
            pointer-events: auto;
        }
        .dpad {
            position: relative;
            width: 120px;
            height: 120px;
        }
        .touch-btn {
            background: rgba(255, 255, 255, 0.25);
            border: 3px solid rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px rgba(0,0,0,0.4);
        }
        .touch-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px rgba(0,0,0,0.4);
            background: rgba(255, 255, 255, 0.5);
        }
        #btnLeft  { position: absolute; left: 0;   top: 40px; width: 45px; height: 40px; }
        #btnRight { position: absolute; right: 0;  top: 40px; width: 45px; height: 40px; }
        #btnDown  { position: absolute; left: 40px; bottom: 0; width: 40px; height: 45px; }
        .action-buttons { gap: 15px; }
        .action-btn { width: 65px; height: 65px; border-radius: 50%; font-size: 1.2rem; }
        #btnStart {
            position: absolute;
            left: 50%;
            bottom: 40px;
            transform: translateX(-50%);
            width: 100px;
            height: 35px;
            font-size: 0.9rem;
            border-radius: 6px;
            pointer-events: auto;
        }
    </style>
</head>
<body>

<h1>Super Level Infinitum</h1>
<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="450"></canvas>
    <div id="touchControls">
        <div class="dpad">
            <div class="touch-btn" id="btnLeft">◀</div>
            <div class="touch-btn" id="btnRight">▶</div>
            <div class="touch-btn" id="btnDown">▼</div>
        </div>
        <div class="touch-btn" id="btnStart">START / R</div>
        <div class="action-buttons">
            <div class="touch-btn action-btn" id="btnJump">▲</div>
        </div>
    </div>
</div>
<div class="controls-hint" id="keyboardHint">
    <span class="key">A</span> / <span class="key">D</span> Laufen |
    <span class="key">W</span> Schwebesprung |
    <span class="key">S</span> Ducken
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let skyGradient;
let isNight = false;

function updateSkyColor() {
    isNight = Math.floor((currentLevel - 1) / 3) % 2 === 1;

    skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    if (isNight) {
        skyGradient.addColorStop(0,    '#010206');
        skyGradient.addColorStop(0.70, '#040712');
        skyGradient.addColorStop(1.0,  '#0a1020');
    } else {
        skyGradient.addColorStop(0,    '#5c94fc');
        skyGradient.addColorStop(0.70, '#98f8f8');
        skyGradient.addColorStop(1.0,  '#b8f818');
    }
}

let _currentFont = '';
function setFont(f) { if (_currentFont !== f) { ctx.font = f; _currentFont = f; } }

// --- SOUND ---
const soundStart    = new Audio('audio/sounds/here_we_go.wav');
const soundComplete = new Audio('audio/sounds/level_complete.mp3');
const soundDeath    = new Audio('audio/sounds/death.mp3');
soundComplete.volume = 0.4;
const musicMain = new Audio('audio/sounds/main_theme.mp3');
musicMain.loop = true;
musicMain.volume = 0.2;

function makeSoundPool(src, volume, size) {
    const items = [];
    for (let i = 0; i < size; i++) {
        const a = new Audio(src);
        a.volume = volume;
        items.push(a);
    }
    let idx = 0;
    return {
        play() {
            const a = items[idx];
            idx = (idx + 1) % items.length;
            a.currentTime = 0;
            a.play().catch(() => {});
        },
        stopAll() {
            for (let i = 0; i < items.length; i++) { items[i].pause(); items[i].currentTime = 0; }
        }
    };
}
const coinPool  = makeSoundPool('audio/sounds/coin.mp3', 1, 4);
const stompPool = makeSoundPool('audio/sounds/goomba_stomp.mp3', 1, 3);

function playSound(a) { a.currentTime = 0; a.play().catch(e => {}); }
function stopAllSounds() {
    [soundStart, soundComplete, soundDeath].forEach(s => { s.pause(); s.currentTime = 0; });
    coinPool.stopAll();
    stompPool.stopAll();
}
function stopMusic() { musicMain.pause(); musicMain.currentTime = 0; }

// --- PHYSIK ---
const GRAVITY        = 0.39;
const JUMP_FORCE     = 12.7;
const MAX_FALL_SPEED = 11.8;
const ACCELERATION   = 1.03;
const FRICTION       = 0.17;
const PLAYER_MAX_SPEED = 5.35;

// --- STATE ---
let gameState       = 'MENU';
let score           = 0;
let currentLevel    = 1;
let animationTimer  = 0;
let enemySpawnCooldown = 0;
let restartEnableTime   = 0;
let lastTime        = performance.now();
let walkDistanceCounter = 0;

const keys = { right: false, left: false, up: false, down: false, jumpPressed: false };

window.addEventListener('keydown', e => {
    if (gameState === 'MENU' && e.code === 'Enter') {
        gameState = 'PLAYING'; stopAllSounds(); playSound(soundStart); playSound(musicMain);
    }
    if (gameState === 'WIN' && e.code === 'KeyR') {
        if (Date.now() < restartEnableTime) return;
        gameState = 'PLAYING';
        resetLevel(); 
        playSound(soundStart); playSound(musicMain);
    }
    if (gameState === 'GAMEOVER' && e.code === 'KeyR') {
        if (Date.now() < restartEnableTime) return;
        gameState = 'PLAYING';
        startNewGame(); 
        playSound(soundStart); playSound(musicMain);
    }
    if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = true;
    if (e.code === 'KeyA' || e.code === 'ArrowLeft')  keys.left  = true;
    if (e.code === 'KeyS' || e.code === 'ArrowDown')  keys.down  = true;
    if (e.code === 'KeyW' || e.code === 'Space' || e.code === 'ArrowUp') {
        keys.jumpPressed = true;
        if (!keys.up && player.grounded && gameState === 'PLAYING' && !player.isDucking) {
            player.velocityY = -JUMP_FORCE;
            player.grounded = false;
        }
        keys.up = true;
    }
});
window.addEventListener('keyup', e => {
    if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = false;
    if (e.code === 'KeyA' || e.code === 'ArrowLeft')  keys.left  = false;
    if (e.code === 'KeyS' || e.code === 'ArrowDown')  keys.down  = false;
    if (e.code === 'KeyW' || e.code === 'Space' || e.code === 'ArrowUp') { keys.up = false; keys.jumpPressed = false; }
});

function setupTouchControls() {
    const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    if (isTouch) {
        document.getElementById('touchControls').style.display = 'flex';
        document.getElementById('keyboardHint').style.display = 'none';
    }
    const bind = (id, press, release) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', e => { e.preventDefault(); press(); });
        el.addEventListener('touchend',   e => { e.preventDefault(); if (release) release(); });
    };
    bind('btnLeft',  () => keys.left  = true, () => keys.left  = false);
    bind('btnRight', () => keys.right = true, () => keys.right = false);
    bind('btnDown',  () => keys.down  = true, () => keys.down  = false);
    bind('btnJump', () => {
        keys.jumpPressed = true;
        if (!keys.up && player.grounded && gameState === 'PLAYING' && !player.isDucking) {
            player.velocityY = -JUMP_FORCE; player.grounded = false;
        }
        keys.up = true;
    }, () => { keys.up = false; keys.jumpPressed = false; });
    bind('btnStart', () => {
        if (gameState === 'MENU') {
            gameState = 'PLAYING'; stopAllSounds(); playSound(soundStart); playSound(musicMain);
        } else if (gameState === 'WIN') {
            if (Date.now() < restartEnableTime) return;
            gameState = 'PLAYING'; resetLevel(); playSound(soundStart); playSound(musicMain);
        } else if (gameState === 'GAMEOVER') {
            if (Date.now() < restartEnableTime) return;
            gameState = 'PLAYING'; startNewGame(); playSound(soundStart); playSound(musicMain);
        }
    });
}

const player = { x: 120, y: 300, width: 32, height: 48, velocityX: 0, velocityY: 0, grounded: false, facing: 'right', isDucking: false };
let platforms = [], coins = [], enemies = [];
const _nearPlayerBuf = [];
const _nearEnemyBuf  = [];
const flagPole = { x: 2500, y: 130, width: 10, height: 270 };
let cameraX = 0;

function startNewGame() { currentLevel = 1; score = 0; resetLevel(); }

function generateProceduralLevel() {
    platforms = []; coins = []; enemies = [];
    platforms.push({ x: 0,   y: 400, width: 500, height: 50, type: 'ground' });
    platforms.push({ x: 120, y: 240, width: 32,  height: 32, type: 'block'  });
    platforms.push({ x: 152, y: 240, width: 32,  height: 32, type: 'lucky'  });
    coins.push({ x: 158, y: 200, collected: false });

    let currentX = 500;
    const endX = 2400;
    const holeChance = Math.min(0.08 + currentLevel * 0.02, 0.25);

    while (currentX < endX) {
        const r = Math.random();
        if (r < holeChance && currentX < endX - 300) {
            currentX += 90 + Math.random() * 30;
            const w = 250 + Math.random() * 150;
            platforms.push({ x: currentX, y: 400, width: w, height: 50, type: 'ground' });
            currentX += w;
        } else {
            const w = 250 + Math.random() * 200;
            platforms.push({ x: currentX, y: 400, width: w, height: 50, type: 'ground' });
            const s = Math.random();
            if (s < 0.25) {
                platforms.push({ x: currentX + 60, y: 320, width: 64, height: 80, type: 'pipe' });
            } else if (s < 0.65) {
                const numBlocks = 3 + Math.floor(Math.random() * 3);
                for (let b = 0; b < numBlocks; b++) {
                    platforms.push({ x: currentX + 40 + b * 32, y: 250, width: 32, height: 32, type: (b === 1 || b === 3) ? 'lucky' : 'block' });
                    coins.push({ x: currentX + 46 + b * 32, y: 210, collected: false });
                }
            }
            currentX += w;
        }
    }
    platforms.push({ x: endX, y: 400, width: 300, height: 50, type: 'ground' });
    flagPole.x = endX + 120;
}

function resetLevel() {
    player.x = 120; player.y = 300; player.height = 48;
    player.velocityX = 0; player.velocityY = 0;
    player.grounded = false; player.isDucking = false;
    cameraX = 0; enemySpawnCooldown = 1.5; walkDistanceCounter = 0;
    updateSkyColor();
    generateProceduralLevel();
}

function triggerDyingSequence() {
    gameState = 'DYING'; restartEnableTime = Date.now() + 4000;
    stopMusic(); stopAllSounds(); playSound(soundDeath);
    player.velocityY = -6;
}
function triggerWinningSequence() {
// Wenn wir schon im Gewinn-Modus sind, brich sofort ab, damit der Sound nicht neu startet!
    if (gameState === 'WINNING') return;
    gameState = 'WINNING'; restartEnableTime = Date.now() + 5000;
    stopMusic(); stopAllSounds(); playSound(soundComplete);
}

function update(dt) {
    if (dt > 0.25) dt = 0;
    if (dt > 0.05) dt = 0.05;
    const MAX_STEP = 1 / 65;
    let rem = dt;
    while (rem > 0) { 
        const s = Math.min(rem, MAX_STEP); 
        rem -= s; 
        _step(s); 
    }
}

function hasGroundAhead(enemy, direction) {
    const checkX = enemy.x + (direction > 0 ? enemy.width + 4 : -4);
    const checkY = enemy.y + enemy.height + 4;
    for (let i = 0; i < platforms.length; i++) {
        const p = platforms[i];
        if (checkX >= p.x && checkX <= p.x + p.width && checkY >= p.y && checkY <= p.y + p.height) {
            return true;
        }
    }
    return false;
}

function _step(dt) {
    const mod = dt * 60;

    if (gameState === 'DYING') {
        player.y += player.velocityY * mod;
        player.velocityY += 0.25 * mod;
        if (Date.now() >= restartEnableTime) gameState = 'GAMEOVER';
        return;
    }
    if (gameState === 'WINNING') {
        if (player.y < 352) player.y += 2.0 * mod;
        if (Date.now() >= restartEnableTime) {
            currentLevel++;
            gameState = 'WIN';
        }
        return;
    }
    if (gameState !== 'PLAYING') return;

    animationTimer += mod;

    if (keys.down && player.grounded) {
        if (!player.isDucking) {
            player.isDucking = true;
            player.y += 22; 
            player.height = 26;
        }
    } else {
        if (player.isDucking) {
            player.isDucking = false;
            player.y -= 22;
            player.height = 48;
        }
    }

    if (enemySpawnCooldown > 0) {
        enemySpawnCooldown -= dt;
    } else if (player.x < flagPole.x - 550) {
        if (Math.random() < 0.32) { 
            const spawnX = cameraX + canvas.width + 45;
            const randType = Math.random();
            
            if (randType < 0.50) {
                enemies.push({ 
                    type: 'GOOMBA', state: 'WALK', x: spawnX, y: 150, width: 36, height: 36, 
                    speed: -(1.32 + Math.random() * 0.48 + currentLevel * 0.1), velocityY: 0, alive: true 
                });
            } else if (randType < 0.75) {
                enemies.push({ 
                    type: 'KOOPA_GREEN', state: 'WALK', x: spawnX, y: 150, width: 32, height: 44, 
                    speed: -(1.0 + Math.random() * 0.3 + currentLevel * 0.05), velocityY: 0, alive: true, facing: 'left' 
                });
            } else {
                enemies.push({ 
                    type: 'KOOPA_RED', state: 'WALK', x: spawnX, y: 150, width: 32, height: 44, 
                    speed: -(1.0 + Math.random() * 0.3 + currentLevel * 0.05), velocityY: 0, alive: true, facing: 'left' 
                });
            }
            enemySpawnCooldown = 2.4 + Math.random() * 2.5; 
        }
    }

    const maxSpd = player.isDucking ? PLAYER_MAX_SPEED * 0.26 : PLAYER_MAX_SPEED;
    const acc    = player.isDucking ? ACCELERATION * 0.21 : ACCELERATION;
    if (keys.right) { player.velocityX = Math.min(player.velocityX + acc * mod,  maxSpd); player.facing = 'right'; }
    else if (keys.left) { player.velocityX = Math.max(player.velocityX - acc * mod, -maxSpd); player.facing = 'left'; }
    else { player.velocityX -= player.velocityX * FRICTION * mod; if (Math.abs(player.velocityX) < 0.09) player.velocityX = 0; }

    if (player.grounded) walkDistanceCounter += Math.abs(player.velocityX) * mod;

    player.velocityY += (player.velocityY < 0 && !keys.jumpPressed ? GRAVITY * 2.55 : GRAVITY) * mod;
    if (player.velocityY > MAX_FALL_SPEED) player.velocityY = MAX_FALL_SPEED;

    player.x += player.velocityX * mod;
    player.y += player.velocityY * mod;
    player.grounded = false;
    if (player.x < 0) { player.x = 0; player.velocityX = 0; }

    const MARGIN = 110;
    _nearPlayerBuf.length = 0;
    for (let pi = 0; pi < platforms.length; pi++) {
        const p = platforms[pi];
        if (p.x + p.width > player.x - MARGIN && p.x < player.x + player.width + MARGIN &&
            p.y + p.height > player.y - MARGIN && p.y < player.y + player.height + MARGIN) {
            _nearPlayerBuf.push(p);
        }
    }
    const near = _nearPlayerBuf;

    for (let i = 0; i < near.length; i++) {
        const plat = near[i];
        if (player.x < plat.x + plat.width && player.x + player.width > plat.x &&
            player.y < plat.y + plat.height && player.y + player.height > plat.y) {
            const ox = Math.min(player.x + player.width, plat.x + plat.width) - Math.max(player.x, plat.x);
            const oy = Math.min(player.y + player.height, plat.y + plat.height) - Math.max(player.y, plat.y);
            if (oy <= ox) {
                if (player.velocityY >= 0 && player.y + player.height - oy <= plat.y + 1) {
                    player.y = plat.y - player.height;
                    player.velocityY = 0;
                    player.grounded = true;
                } else if (player.velocityY < 0) {
                    player.y = plat.y + plat.height;
                    player.velocityY = 0;
                    if (plat.type === 'lucky') {
                        plat.type = 'used';
                        score += 5;
                        coinPool.play();
                    }
                }
            }
        }
    }
    for (let i = 0; i < near.length; i++) {
        const plat = near[i];
        if (player.x < plat.x + plat.width && player.x + player.width > plat.x &&
            player.y < plat.y + plat.height && player.y + player.height > plat.y) {
            const ox = Math.min(player.x + player.width, plat.x + plat.width) - Math.max(player.x, plat.x);
            const oy = Math.min(player.y + player.height, plat.y + plat.height) - Math.max(player.y, plat.y);
            if (ox < oy) {
                if (player.velocityX > 0) player.x = plat.x - player.width;
                else if (player.velocityX < 0) player.x = plat.x + plat.width;
                player.velocityX = 0;
            }
        }
    }

    for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        
        if (!enemy.alive) {
            if (enemy.y < canvas.height + 60) enemy.y += 4 * mod;
            else enemies.splice(i, 1);
            continue;
        }

        if (enemy.state !== 'SHELL') {
            enemy.velocityY += GRAVITY * mod;
            if (enemy.velocityY > MAX_FALL_SPEED) enemy.velocityY = MAX_FALL_SPEED;
            enemy.x += enemy.speed * mod;
            enemy.y += enemy.velocityY * mod;
        } else {
            enemy.velocityY += GRAVITY * mod;
            if (enemy.velocityY > MAX_FALL_SPEED) enemy.velocityY = MAX_FALL_SPEED;
            enemy.y += enemy.velocityY * mod;
        }

        if (enemy.type === 'KOOPA_RED' && enemy.state === 'WALK' && enemy.velocityY === 0) {
            const dir = enemy.speed > 0 ? 1 : -1;
            if (!hasGroundAhead(enemy, dir)) {
                enemy.speed *= -1;
                enemy.facing = enemy.speed > 0 ? 'right' : 'left';
            }
        }

        _nearEnemyBuf.length = 0;
        for (let pi = 0; pi < platforms.length; pi++) {
            const p = platforms[pi];
            if (p.x + p.width > enemy.x - 55 && p.x < enemy.x + enemy.width + 55 &&
                p.y + p.height > enemy.y - 55 && p.y < enemy.y + enemy.height + 55) {
                _nearEnemyBuf.push(p);
            }
        }
        const nearPlat = _nearEnemyBuf;

        for (let j = 0; j < nearPlat.length; j++) {
            const plat = nearPlat[j];
            if (enemy.x < plat.x + plat.width && enemy.width + enemy.x > plat.x &&
                enemy.y < plat.y + plat.height && enemy.y + enemy.height > plat.y) {
                const ox = Math.min(enemy.x + enemy.width, plat.x + plat.width) - Math.max(enemy.x, plat.x);
                const oy = Math.min(enemy.y + enemy.height, plat.y + plat.height) - Math.max(enemy.y, plat.y);
                if (oy < ox) {
                    if (enemy.velocityY >= 0 && enemy.y + enemy.height - oy <= plat.y + 1) {
                        enemy.y = plat.y - enemy.height;
                        enemy.velocityY = 0;
                    }
                } else {
                    enemy.speed *= -1;
                    if (enemy.type && enemy.type.startsWith('KOOPA')) {
                        enemy.facing = enemy.speed > 0 ? 'right' : 'left';
                    }
                    enemy.x += enemy.speed * mod * 2;
                }
            }
        }

        if (enemy.state === 'SLIDING') {
            for (let k = 0; k < enemies.length; k++) {
                const other = enemies[k];
                if (other !== enemy && other.alive && other.state !== 'SLIDING') {
                    if (enemy.x < other.x + other.width && enemy.x + enemy.width > other.x &&
                        enemy.y < other.y + other.height && enemy.y + enemy.height > other.y) {
                        other.alive = false;
                        score += 15;
                        stompPool.play();
                    }
                }
            }
        }

        if (player.x < enemy.x + enemy.width && player.x + player.width > enemy.x &&
            player.y < enemy.y + enemy.height && player.y + player.height > enemy.y) {
            
            const isStomp = player.velocityY > 0 && player.y + player.height <= enemy.y + 22;

            if (isStomp) {
                player.velocityY = -JUMP_FORCE * 0.67;
                stompPool.play();

                if (enemy.type === 'GOOMBA') {
                    enemy.alive = false;
                    score += 10;
                } else if (enemy.type.startsWith('KOOPA')) {
                    if (enemy.state === 'WALK') {
                        enemy.state = 'SHELL';
                        enemy.height = 32;
                        enemy.y += 12;
                        enemy.speed = 0;
                        score += 10;
                    } else if (enemy.state === 'SHELL' || enemy.state === 'SLIDING') {
                        enemy.state = 'SHELL';
                        enemy.speed = 0;
                    }
                }
            } else {
                if (enemy.type.startsWith('KOOPA') && enemy.state === 'SHELL') {
                    enemy.state = 'SLIDING';
                    const kickDir = (player.x + player.width / 2 < enemy.x + enemy.width / 2) ? 1 : -1;
                    enemy.speed = kickDir * 6.5; 
                    enemy.x += enemy.speed * mod; 
                } else if (enemy.state === 'SLIDING' && Math.abs(enemy.speed) > 0.1) {
                    triggerDyingSequence();
                } else if (enemy.state === 'WALK') {
                    triggerDyingSequence();
                }
            }
        }
        if (enemy.y > canvas.height + 40) enemy.alive = false;
    }

    if (enemies.length > 25) { 
        let w = 0;
        for (let i = 0; i < enemies.length; i++) {
            if (enemies[i].alive || enemies[i].y < canvas.height + 110) enemies[w++] = enemies[i];
        }
        enemies.length = w;
    }
    if (coins.length > 48) {
        let w = 0;
        for (let i = 0; i < coins.length; i++) {
            if (!coins[i].collected) coins[w++] = coins[i];
        }
        coins.length = w;
    }

    for (let i = 0; i < coins.length; i++) {
        const coin = coins[i];
        if (!coin.collected &&
            player.x < coin.x + 20 && player.x + player.width > coin.x &&
            player.y < coin.y + (player.isDucking ? 16 : 21) && player.y + player.height > coin.y) {
            coin.collected = true;
            score += 1;
            coinPool.play();
        }
    }

    if (gameState === 'PLAYING' &&
        player.x < flagPole.x + flagPole.width && player.x + player.width > flagPole.x &&
        player.y < flagPole.y + flagPole.height && player.y + player.height > flagPole.y) {
        triggerWinningSequence();
    }
    if (player.y > canvas.height + 20) triggerDyingSequence();

    let targetCamX = player.x - canvas.width / 2.75;
    if (targetCamX < 0) targetCamX = 0;
    cameraX += (targetCamX - cameraX) * 0.068 * mod;
}

// --- RENDERING ---
function drawRetroBlock(x, y, w, h, base, dark, light) {
    ctx.fillStyle = base;  ctx.fillRect(x, y, w, h);
    ctx.fillStyle = light; ctx.fillRect(x, y, w, 2); ctx.fillRect(x, y, 2, h);
    ctx.fillStyle = dark;  ctx.fillRect(x, y + h - 2, w, 2); ctx.fillRect(x + w - 2, y, 2, h);
    ctx.fillStyle = '#000';
    ctx.fillRect(x+3, y+3, 2, 2); ctx.fillRect(x+w-5, y+3, 2, 2);
    ctx.fillRect(x+3, y+h-5, 2, 2); ctx.fillRect(x+w-5, y+h-5, 2, 2);
}

function getGroundTexture(plat) {
    if (plat._tex) return plat._tex;
    const fx = plat.x - Math.floor(plat.x);
    const w = Math.ceil(fx + plat.width), h = Math.ceil(plat.height);
    const tex = document.createElement('canvas');
    tex.width = w; tex.height = h;
    const tctx = tex.getContext('2d');
    tctx.fillStyle = '#b84418'; tctx.fillRect(fx, 0, plat.width, plat.height);
    for (let i = 0; i < plat.width; i += 16) {
        tctx.fillStyle = '#983408';
        tctx.fillRect(fx+i, 12, 1, plat.height - 12);
        tctx.fillRect(fx+i, 28, 16, 1);
    }
    tctx.fillStyle = '#00a800'; tctx.fillRect(fx, 0, plat.width, 12);
    tctx.fillStyle = '#b8f818'; tctx.fillRect(fx, 0, plat.width, 4);
    plat._tex = tex;
    plat._texDrawX = Math.floor(plat.x);
    return tex;
}

function drawKoopa(ctx, enemy) {
    const isGreen = enemy.type === 'KOOPA_GREEN';
    const mainColor = isGreen ? '#00a800' : '#f83800';   
    const lightShell = isGreen ? '#b8f818' : '#ffa044';  
    const skinColor = '#f8b800';                         
    
    const isRight = enemy.facing === 'right';

    ctx.save();
    if (isRight) {
        ctx.translate(enemy.x + enemy.width, enemy.y);
        ctx.scale(-1, 1);
    } else {
        ctx.translate(enemy.x, enemy.y);
    }

    if (enemy.state === 'WALK') {
        const legBlink = Math.floor(animationTimer / 10) % 2 === 0;

        ctx.fillStyle = skinColor;
        if (legBlink) {
            ctx.fillRect(10, 32, 6, 12); ctx.fillRect(22, 32, 6, 12);
            ctx.fillStyle = '#000'; ctx.fillRect(8, 42, 4, 2); ctx.fillRect(20, 42, 4, 2);
        } else {
            ctx.fillRect(14, 32, 6, 12); ctx.fillRect(26, 32, 6, 12);
            ctx.fillStyle = '#000'; ctx.fillRect(12, 42, 4, 2); ctx.fillRect(24, 42, 4, 2);
        }

        ctx.fillStyle = '#000000'; ctx.fillRect(14, 12, 18, 24); 
        ctx.fillStyle = mainColor; ctx.fillRect(16, 14, 14, 20); 
        ctx.fillStyle = lightShell; 
        ctx.fillRect(20, 16, 8, 4); ctx.fillRect(18, 24, 8, 4);
        
        ctx.fillStyle = '#f8f8f8'; ctx.fillRect(12, 16, 4, 18);

        ctx.fillStyle = skinColor;
        ctx.fillRect(8, 16, 6, 8);  
        ctx.fillRect(0, 8, 12, 12); 
        ctx.fillRect(0, 12, 14, 8);  
        
        ctx.fillStyle = '#ffffff'; ctx.fillRect(4, 10, 4, 5);
        ctx.fillStyle = '#000000'; ctx.fillRect(4, 10, 2, 3);

    } else {
        const spinRotation = enemy.state === 'SLIDING' ? Math.floor(animationTimer / 4) % 4 : 0;

        ctx.translate(enemy.width / 2, enemy.height / 2);
        ctx.rotate((spinRotation * 90 * Math.PI) / 180);
        ctx.translate(-enemy.width / 2, -enemy.height / 2);

        ctx.fillStyle = '#000000'; 
        ctx.fillRect(4, 2, 24, 28); 
        ctx.fillRect(2, 4, 28, 24); 
        
        ctx.fillStyle = mainColor; 
        ctx.fillRect(6, 4, 20, 24);
        ctx.fillRect(4, 6, 24, 20);

        ctx.fillStyle = lightShell;
        ctx.fillRect(8, 8, 6, 6); ctx.fillRect(18, 16, 6, 6);

        ctx.fillStyle = '#f8f8f8'; 
        ctx.fillRect(4, 20, 24, 4);
        ctx.fillStyle = '#000000'; 
        ctx.fillRect(4, 24, 24, 1);
    }

    ctx.restore();
}

function drawPlayer(ctx, p) {
    ctx.save();
    
    if (p.facing === 'left') {
        ctx.translate(p.x + p.width, p.y);
        ctx.scale(-1, 1);
    } else {
        ctx.translate(p.x, p.y);
    }

    // Klassische, kräftige Retro-Farben
    const red = '#e41212';
    const blue = '#143cc4';
    const skin = '#ffcca4';
    const brown = '#6c3a04';
    const white = '#ffffff';
    const yellow = '#fcd800';

    if (p.isDucking) {
        // --- GEQUETSCHTER / PLATTGEDRÜCKTER RETRO LOOK ---
        // Die originale Grafik wird vertikal stark gestaucht, Mütze verdeckt fast alles.

        // Schuhe flach am Boden
        ctx.fillStyle = brown;
        ctx.fillRect(4, 22, 10, 4);
        ctx.fillRect(16, 22, 10, 4);

        // Plattgedrückte blaue Hose
        ctx.fillStyle = blue;
        ctx.fillRect(6, 12, 18, 10);
        // Gelbe Punkte lugen hervor
        ctx.fillStyle = yellow;
        ctx.fillRect(8, 14, 3, 2);
        ctx.fillRect(19, 14, 3, 2);

        // Gequetschter roter Oberkörper & Ärmel
        ctx.fillStyle = red;
        ctx.fillRect(4, 8, 22, 4);
        ctx.fillRect(2, 10, 3, 6);
        ctx.fillRect(25, 10, 3, 6);
        ctx.fillStyle = white;
        ctx.fillRect(1, 14, 4, 4);
        ctx.fillRect(25, 14, 4, 4);

        // Haare hinten rausschauend
        ctx.fillStyle = brown;
        ctx.fillRect(4, 6, 4, 6);

        // Gequetschtes Gesicht (Augen verschwinden fast unter der tiefen Mütze)
        ctx.fillStyle = skin;
        ctx.fillRect(8, 4, 14, 5);
        ctx.fillRect(22, 5, 5, 4); // Nase steht vorn raus

        // Schnurrbart kompakt darunter eingeklemmt
        ctx.fillStyle = brown;
        ctx.fillRect(16, 7, 10, 2);

        // Augen sind fast vollständig durch die Mütze verdeckt (nur 1 Pixel Zeile Sichtbarkeit)
        ctx.fillStyle = white; ctx.fillRect(18, 4, 3, 1);
        ctx.fillStyle = '#000';  ctx.fillRect(19, 4, 1, 1);

        // Breite, platte Mütze deckt den Kopf komplett ab
        ctx.fillStyle = red;
        ctx.fillRect(6, 0, 16, 3);
        ctx.fillRect(4, 2, 23, 2);
    } else {
        // --- KLASSISCHER KANTIGER PIXEL MARIO LOOK ---
        const isMoving = Math.abs(p.velocityX) > 0.15 && p.grounded;
        const wave = Math.sin(walkDistanceCounter * 0.05);
        
        let legOffset1 = 0;
        let legOffset2 = 0;
        let armOffset = 0;
        if (isMoving) {
            legOffset1 = Math.floor(wave * 3);
            legOffset2 = -Math.floor(wave * 3);
            armOffset = Math.floor(wave * 3);
        } else if (!p.grounded) {
            legOffset1 = -2;
            legOffset2 = 3;
            armOffset = -3;
        }

        // 1. SCHUHE (Kantige Blöcke)
        ctx.fillStyle = brown;
        ctx.fillRect(4 + legOffset1, 40, 10, 8); 
        ctx.fillRect(16 + legOffset2, 40, 10, 8); 

        // 2. HOSE (Klassisch Latzhose)
        ctx.fillStyle = blue;
        ctx.fillRect(6, 24, 18, 16); 
        ctx.fillRect(6 + legOffset1, 34, 7, 6); 
        ctx.fillRect(15 + legOffset2, 34, 7, 6); 
        
        // Träger
        ctx.fillRect(8, 18, 4, 6);
        ctx.fillRect(18, 18, 4, 6);
        
        // Knöpfe
        ctx.fillStyle = yellow;
        ctx.fillRect(8, 24, 3, 3);
        ctx.fillRect(19, 24, 3, 3);

        // 3. SHIRT (Rot, klare große Pixelstrukturen)
        ctx.fillStyle = red;
        ctx.fillRect(8, 16, 14, 8); 
        ctx.fillRect(3 - armOffset, 20 + armOffset, 4, 8); 
        ctx.fillRect(23 + armOffset, 18 - armOffset, 4, 8); 

        // 4. HANDSCHUHE (Weiß)
        ctx.fillStyle = white;
        ctx.fillRect(2 - armOffset, 28 + armOffset, 5, 5); 
        ctx.fillRect(23 + armOffset, 26 - armOffset, 5, 5); 

        // 5. KOPF & GESICHT (Kantig, Retro-Proportionen)
        ctx.fillStyle = brown;
        ctx.fillRect(6, 8, 5, 10);
        ctx.fillRect(8, 14, 4, 4);

        ctx.fillStyle = skin;
        ctx.fillRect(10, 6, 13, 12);
        ctx.fillRect(23, 10, 5, 4); // Nase

        // Schnurrbart
        ctx.fillStyle = brown;
        ctx.fillRect(17, 14, 10, 4);

        // Auge
        ctx.fillStyle = white;
        ctx.fillRect(17, 6, 4, 5);
        ctx.fillStyle = '#000';
        ctx.fillRect(19, 6, 2, 4);

        // Ohr
        ctx.fillStyle = skin;
        ctx.fillRect(8, 10, 3, 4);

        // 6. ROTE MÜTZE
        ctx.fillStyle = red;
        ctx.fillRect(8, 0, 15, 4);  
        ctx.fillRect(5, 3, 19, 3);  
        ctx.fillRect(10, 6, 20, 2); // Schirm nach vorne
    }

    ctx.restore();
}

function draw() {
    ctx.fillStyle = skyGradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-cameraX, 0);

    ctx.fillStyle = isNight ? '#0b101d' : '#3f69c7';
    for (let i = 0; i < 6; i++) {
        const bx = i * 550 - cameraX * 0.1;
        if (bx + 320 < cameraX - 50 || bx > cameraX + canvas.width + 50) continue;
        ctx.beginPath(); ctx.moveTo(bx, 400); ctx.lineTo(bx+160, 200); ctx.lineTo(bx+320, 400); ctx.fill();
    }
    ctx.fillStyle = isNight ? '#11182b' : '#4c78db';
    for (let i = 0; i < 7; i++) {
        const bx = i * 400 - 50 - cameraX * 0.18;
        if (bx + 240 < cameraX - 50 || bx > cameraX + canvas.width + 50) continue;
        ctx.beginPath(); ctx.moveTo(bx, 400); ctx.lineTo(bx+120, 240); ctx.lineTo(bx+240, 400); ctx.fill();
    }
    
    for (let i = 0; i < 6; i++) {
        const cx = 100 + i * 600 - cameraX * 0.03;
        if (cx + 100 < cameraX - 50 || cx > cameraX + canvas.width + 50) continue;
        ctx.fillStyle = isNight ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.35)';
        ctx.beginPath(); ctx.arc(cx+4,74,24,0,Math.PI*2); ctx.arc(cx+34,64,34,0,Math.PI*2); ctx.arc(cx+64,74,24,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = isNight ? 'rgba(255,255,255,0.12)' : '#fff';
        ctx.beginPath(); ctx.arc(cx,70,24,0,Math.PI*2); ctx.arc(cx+30,60,34,0,Math.PI*2); ctx.arc(cx+60,70,24,0,Math.PI*2); ctx.fill();
    }

    const vL = cameraX - 50, vR = cameraX + canvas.width + 50;

    for (let pi = 0; pi < platforms.length; pi++) {
        const plat = platforms[pi];
        if (plat.x + plat.width < vL || plat.x > vR) continue;
        if (plat.type === 'ground') {
            ctx.drawImage(getGroundTexture(plat), plat._texDrawX, plat.y);
        } else if (plat.type === 'block') {
            drawRetroBlock(plat.x, plat.y, plat.width, plat.height, '#cc6633','#662200','#ff9966');
        } else if (plat.type === 'lucky') {
            const blink = Math.floor(animationTimer / 25) % 2 === 0;
            drawRetroBlock(plat.x, plat.y, plat.width, plat.height, blink?'#fcc018':'#cc9000','#553300','#ffea75');
            ctx.fillStyle='#000'; setFont('bold 22px monospace'); ctx.fillText('?',plat.x+11,plat.y+25);
            ctx.fillStyle='#fff'; ctx.fillText('?',plat.x+10,plat.y+24);
        } else if (plat.type === 'used') {
            drawRetroBlock(plat.x, plat.y, plat.width, plat.height, '#7c7c7c','#333333','#aaaaaa');
            ctx.fillStyle='#333'; ctx.fillRect(plat.x+8,plat.y+8,plat.width-16,plat.height-16);
        } else if (plat.type === 'pipe') {
            ctx.fillStyle='#00a800'; ctx.fillRect(plat.x,plat.y+24,plat.width,plat.height-24);
            ctx.fillStyle='#44d844'; ctx.fillRect(plat.x+8,plat.y+24,12,plat.height-24);
            ctx.fillStyle='#007000'; ctx.fillRect(plat.x+plat.width-12,plat.y+24,8,plat.height-24);
            ctx.fillStyle='#00a800'; ctx.fillRect(plat.x-4,plat.y,plat.width+8,24);
            ctx.fillStyle='#44d844'; ctx.fillRect(plat.x,plat.y,12,24);
            ctx.strokeStyle='#000'; ctx.lineWidth=2;
            ctx.strokeRect(plat.x-4,plat.y,plat.width+8,24);
            ctx.strokeRect(plat.x,plat.y+24,plat.width,plat.height-24);
        }
    }

    for (let i = 0; i < coins.length; i++) {
        const coin = coins[i];
        if (coin.collected || coin.x+20 < vL || coin.x > vR) continue;
        const widthMod = Math.abs(Math.sin(animationTimer * 0.06));
        const w = Math.max(2, 12 * widthMod);
        const offsetX = 10 - w/2;
        ctx.fillStyle='#000';    ctx.fillRect(coin.x+offsetX-2, coin.y, w+4, 16); ctx.fillRect(coin.x+offsetX, coin.y-2, w, 20);
        ctx.fillStyle='#fcc018'; ctx.fillRect(coin.x+offsetX-2, coin.y+2, w+4, 12); ctx.fillRect(coin.x+offsetX, coin.y, w, 16);
        ctx.fillStyle='#fff';    if (w > 4) ctx.fillRect(coin.x+offsetX+w/2-2, coin.y+2, 2, 12);
    }

    for (let i = 0; i < enemies.length; i++) {
        const enemy = enemies[i];
        if (enemy.x+enemy.width < vL || enemy.x > vR) continue;
        
        if (enemy.type === 'GOOMBA') {
            if (enemy.alive) {
                const step = Math.floor(animationTimer / 10) % 2 === 0;

                ctx.fillStyle = '#000000'; ctx.fillRect(enemy.x + 2, enemy.y, 32, 18); 
                ctx.fillStyle = '#803000'; ctx.fillRect(enemy.x + 4, enemy.y + 2, 28, 16); 
                ctx.fillStyle = '#b85c18'; 
                ctx.fillRect(enemy.x + 8, enemy.y + 2, 20, 4); 
                ctx.fillRect(enemy.x + 12, enemy.y + 6, 10, 2);

                ctx.fillStyle = '#000000'; ctx.fillRect(enemy.x + 6, enemy.y + 18, 24, 11); 
                ctx.fillStyle = '#ffcc99'; ctx.fillRect(enemy.x + 8, enemy.y + 18, 20, 9); 

                ctx.fillStyle = '#000000';
                ctx.fillRect(enemy.x + 8,  enemy.y + 19, 3, 2);
                ctx.fillRect(enemy.x + 10, enemy.y + 20, 4, 2);
                ctx.fillRect(enemy.x + 24, enemy.y + 19, 3, 2);
                ctx.fillRect(enemy.x + 21, enemy.y + 20, 4, 2);
                
                ctx.fillStyle = '#ffffff'; 
                ctx.fillRect(enemy.x + 11, enemy.y + 22, 3, 4); ctx.fillRect(enemy.x + 21, enemy.y + 22, 3, 4);
                ctx.fillStyle = '#000000'; 
                ctx.fillRect(enemy.x + 11, enemy.y + 22, 2, 3); ctx.fillRect(enemy.x + 22, enemy.y + 22, 2, 3);

                ctx.fillRect(enemy.x + 14, enemy.y + 26, 8, 1);

                ctx.fillStyle = '#000000';
                if (step) {
                    ctx.fillRect(enemy.x + 2, enemy.y + 28, 13, 8);  
                    ctx.fillRect(enemy.x + 21, enemy.y + 27, 11, 7);  
                } else {
                    ctx.fillRect(enemy.x + 4, enemy.y + 27, 11, 7);  
                    ctx.fillRect(enemy.x + 21, enemy.y + 28, 13, 8); 
                }
            } else {
                ctx.fillStyle = '#803000'; ctx.fillRect(enemy.x + 2, enemy.y + 22, 32, 14);
                ctx.fillStyle = '#ffcc99'; ctx.fillRect(enemy.x + 6, enemy.y + 26, 24, 8);
                ctx.fillStyle = '#000000'; ctx.fillRect(enemy.x + 8, enemy.y + 24, 5, 3); ctx.fillRect(enemy.x + 23, enemy.y + 24, 5, 3);
            }
        } else if (enemy.type && enemy.type.startsWith('KOOPA')) {
            drawKoopa(ctx, enemy);
        }
    }

    ctx.fillStyle = '#000000';
    ctx.fillRect(flagPole.x, flagPole.y, flagPole.width, flagPole.height);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(flagPole.x + 2, flagPole.y, 3, flagPole.height);
    ctx.fillStyle = '#a8a8a8';
    ctx.fillRect(flagPole.x + 5, flagPole.y, 3, flagPole.height);
    ctx.fillStyle = '#000000';
    ctx.fillRect(flagPole.x - 4, flagPole.y - 12, 18, 12);
    ctx.fillStyle = '#fcb418';
    ctx.fillRect(flagPole.x - 2, flagPole.y - 10, 14, 8);
    ctx.fillStyle = '#ffe475';
    ctx.fillRect(flagPole.x - 2, flagPole.y - 10, 4, 4);

    const waveFrame = Math.floor(animationTimer / 12) % 4;
    const waveY = (waveFrame === 1) ? -4 : (waveFrame === 3 ? 4 : 0);
    const fx = flagPole.x - 48;
    const fy = flagPole.y + 24 + waveY;
    ctx.fillStyle = '#000000';
    ctx.fillRect(fx, fy, 48, 36);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(fx + 3, fy + 3, 42, 30);
    ctx.fillStyle = '#00a800';
    ctx.fillRect(fx + 12, fy + 9, 24, 18);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(fx + 16, fy + 13, 4, 4);
    ctx.fillRect(fx + 28, fy + 13, 4, 4);
    ctx.fillRect(fx + 18, fy + 21, 12, 3);

    drawPlayer(ctx, player);

    ctx.restore();

    ctx.fillStyle='#fff'; setFont('bold 22px "Courier New"');
    ctx.fillText('MARIO   SCORE', 30, 35);
    ctx.fillText(` 0000    ${score.toString().padStart(4,'0')}`, 30, 60);
    ctx.fillText(`WORLD 5-${currentLevel}`, canvas.width - 160, 35);

    if (gameState === 'MENU')     drawMenu();
    if (gameState === 'GAMEOVER') drawEndScreen('GAME OVER',    '#ff3333', 'Drücke "R" für Neustart');
    if (gameState === 'WIN')      drawEndScreen('STAGE CLEAR!', '#33cc33', 'Drücke "R" für das nächste Level!');
}

function drawMenu() {
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.textAlign='center';
    ctx.fillStyle='#ffcc00'; setFont('bold 46px "Courier New"'); ctx.fillText('SUPER MARIO BROS.', canvas.width/2, 160);
    ctx.fillStyle='#fff';    setFont('bold 22px "Courier New"'); ctx.fillText('PROCEDURAL INFINITE', canvas.width/2, 210);
    if (Math.floor(Date.now()/400)%2===0) { setFont('20px "Courier New"'); ctx.fillText('DRÜCKE ENTER ZUM STARTEN', canvas.width/2, 330); }
    ctx.textAlign='left';
}
function drawEndScreen(title, color, sub) {
    ctx.fillStyle='rgba(0,0,0,0.85)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle=color; setFont('bold 42px "Courier New"'); ctx.textAlign='center';
    ctx.fillText(title, canvas.width/2, canvas.height/2-10);
    ctx.fillStyle='#fff'; setFont('20px "Courier New"');
    ctx.fillText(sub, canvas.width/2, canvas.height/2+40);
    ctx.textAlign='left';
}

function gameLoop(now) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    update(dt);
    draw();
    requestAnimationFrame(gameLoop);
}

startNewGame();
setupTouchControls();
requestAnimationFrame(t => { lastTime = t; gameLoop(t); });
</script>
